services:
  app:
    build: .
    ports:
      - "8501:8501"
      - "8000:8000"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://localhost:8000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: chatbot
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d chatbot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
